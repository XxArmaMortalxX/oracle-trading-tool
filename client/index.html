<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary Meta Tags -->
    <title>Axiarch Trading Algorithm | AI Stock Screener</title>
    <meta name="title" content="Axiarch Trading Algorithm | AI Stock Screener" />
    <meta name="description" content="AI-powered stock screener with real-time sentiment tracking across Reddit, X, and TikTok. 20 scored picks daily before market open." />
    <meta name="keywords" content="algorithmic trading, stock screener, sentiment analysis, day trading tools, stock picks, social media trading" />
    <meta name="author" content="Axiarch Trading" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://axiarchtrading.live" />

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://axiarchtrading.live" />
    <meta property="og:title" content="The Axiarch Trading Algorithm | Stop Guessing. Start Knowing." />
    <meta property="og:description" content="AI-powered stock screening with real-time social sentiment from Reddit, X, and TikTok. 20 algorithmically scored picks delivered daily before market open. Free until April 28." />
    <meta property="og:site_name" content="Axiarch Trading" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://axiarchtrading.live" />
    <meta name="twitter:title" content="The Axiarch Trading Algorithm | AI-Powered Stock Screening" />
    <meta name="twitter:description" content="Scans thousands of stocks, tracks sentiment across Reddit, X & TikTok, and delivers 20 scored picks every morning. Built for traders who want data, not opinions." />

    <!-- Additional SEO -->
    <meta name="theme-color" content="#dc2626" />
    <meta name="application-name" content="Axiarch Trading" />
    <meta name="apple-mobile-web-app-title" content="Axiarch" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "The Axiarch Trading Algorithm",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web",
      "description": "AI-powered algorithmic stock screening platform that combines technical analysis with real-time social sentiment tracking across Reddit, X, and TikTok to deliver daily scored stock picks.",
      "url": "https://axiarchtrading.live",
      "offers": {
        "@type": "Offer",
        "price": "29.99",
        "priceCurrency": "USD",
        "priceValidUntil": "2027-12-31",
        "availability": "https://schema.org/InStock"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "1"
      },
      "featureList": [
        "Algorithmic stock screening with 7-step scoring framework",
        "Real-time social sentiment analysis across Reddit, X, and TikTok",
        "NLP-powered sentiment classification with negation and sarcasm detection",
        "Daily top 20 stock picks delivered before market open",
        "Cross-platform Social Radar with velocity tracking",
        "Sentiment shift alerts for bearish-to-bullish momentum changes",
        "Risk-Calibrated Trade calculator for position sizing",
        "Custom stock screener with multi-factor filtering"
      ]
    }
    </script>

    <!-- Organization Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Axiarch Trading",
      "url": "https://axiarchtrading.live",
      "description": "Algorithmic trading intelligence platform for day traders and swing traders."
    }
    </script>

    <!-- FAQ Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is the Axiarch Trading Algorithm?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Axiarch is an AI-powered algorithmic stock screening platform that scans thousands of stocks daily, tracks real-time social sentiment across Reddit, X, and TikTok, and delivers 20 algorithmically scored stock picks every morning before market open."
          }
        },
        {
          "@type": "Question",
          "name": "How does the sentiment analysis work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Axiarch uses a multi-tier NLP sentiment classifier. The primary tier uses LLM-based analysis (Gemini 2.5 Flash) for context-aware classification. The fallback tier uses enhanced keyword matching with negation detection, sarcasm heuristics, and temporal modifiers. Posts from Reddit, X, and TikTok are classified as Bullish, Bearish, or Neutral."
          }
        },
        {
          "@type": "Question",
          "name": "How much does Axiarch cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Axiarch is currently free for everyone until April 28, 2026. After the free period, it will be $29.99 per month with no long-term commitment. You can cancel anytime."
          }
        },
        {
          "@type": "Question",
          "name": "Is Axiarch a signal service or financial advisor?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Axiarch is a data tool, not a signal service or financial advisor. It provides algorithmic analysis and social sentiment data to help traders make more informed decisions. All trading involves risk."
          }
        }
      ]
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
